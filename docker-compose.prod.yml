# Üretim ortamı
# Kullanım: npm run deploy

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_WEB_URL: ${NEXT_PUBLIC_WEB_URL}
        NEXT_PUBLIC_PANEL_URL: ${NEXT_PUBLIC_PANEL_URL}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_CDN_URL: ${NEXT_PUBLIC_CDN_URL}
    container_name: turkmuhendisi-app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-turkmuhendisi}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-turkmuhendisi}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
    expose:
      - "3000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    container_name: turkmuhendisi-migrate
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-turkmuhendisi}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-turkmuhendisi}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  nginx:
    image: nginx:alpine
    container_name: turkmuhendisi-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./infra/certbot/conf:/etc/letsencrypt:ro
      - ./infra/certbot/www:/var/www/certbot:ro
    depends_on:
      - app
      - minio
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    ports: !reset []
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-turkmuhendisi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-turkmuhendisi}

  redis:
    ports: !reset []

  minio:
    ports: !reset []
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_CONSOLE_URL:-https://cdn.turkmuhendisi.com}

  minio-init:
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-turkmuhendisi}

  cdn:
    profiles: ["dev-only"]
