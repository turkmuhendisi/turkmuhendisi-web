# Geliştirme / Docker içi CDN proxy
# cdn.turkmuhendisi.com -> MinIO turkmuhendisi bucket (path rewrite)
# Yerel test: http://localhost:9080

upstream minio_cdn {
    server minio:9000;
    keepalive 32;
}

server {
    listen 80;
    server_name cdn.turkmuhendisi.com localhost;

    client_max_body_size 50m;

    location / {
        proxy_pass http://minio_cdn/turkmuhendisi/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-amz-id-2;
        proxy_hide_header Server;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Content-Type, Origin, Accept" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Type, ETag, Last-Modified" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            return 204;
        }

        # Statik dosyalar için uzun süreli cache
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
