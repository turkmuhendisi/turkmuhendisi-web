services:
  postgres:
    image: postgres:16-alpine
    container_name: turkmuhendisi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-turkmuhendisi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-turkmuhendisi}
      POSTGRES_DB: ${POSTGRES_DB:-turkmuhendisi}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turkmuhendisi -d turkmuhendisi"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: turkmuhendisi-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: turkmuhendisi-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_CONSOLE_URL:-http://localhost:9001}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: turkmuhendisi-minio-init
    depends_on:
      minio:
        condition: service_healthy
    volumes:
      - ./infra/minio/cors.json:/tmp/cors.json:ro
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-turkmuhendisi}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $$MINIO_ACCESS_KEY $$MINIO_SECRET_KEY &&
      mc mb local/$$MINIO_BUCKET --ignore-existing &&
      mc anonymous set download local/$$MINIO_BUCKET &&
      mc cors set local/$$MINIO_BUCKET /tmp/cors.json &&
      echo 'MinIO bucket ve CORS hazir'
      "

  cdn:
    image: nginx:alpine
    container_name: turkmuhendisi-cdn
    restart: unless-stopped
    ports:
      - "${CDN_PORT:-9080}:80"
    volumes:
      - ./infra/nginx/cdn.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
  minio_data:
