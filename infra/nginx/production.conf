# ─── API ─────────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    server_name api.turkmuhendisi.com;

    ssl_certificate /etc/letsencrypt/live/turkmuhendisi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/turkmuhendisi.com/privkey.pem;
