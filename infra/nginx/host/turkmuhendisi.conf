# Host nginx — turkmuhendisi.com (paylaşımlı sunucu)
# Kurulum: sudo ./scripts/nginx-host-install.sh
# Gereksinim: /etc/letsencrypt/live/turkmuhendisi.com/ sertifikası

upstream turkmuhendisi_app {
    server 127.0.0.1:3020;
    keepalive 8;
}

upstream turkmuhendisi_cdn {
    server 127.0.0.1:3021;
    keepalive 8;
}

server {
    listen 80;
    listen __NGINX_BIND_IP__:80;
    server_name turkmuhendisi.com www.turkmuhendisi.com panel.turkmuhendisi.com api.turkmuhendisi.com cdn.turkmuhendisi.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen __NGINX_BIND_IP__:443 ssl http2;
    server_name turkmuhendisi.com www.turkmuhendisi.com;

    ssl_certificate /etc/letsencrypt/live/turkmuhendisi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/turkmuhendisi.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;

    if ($host = www.turkmuhendisi.com) {
        return 301 https://turkmuhendisi.com$request_uri;
    }

    location / {
        proxy_pass http://turkmuhendisi_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen __NGINX_BIND_IP__:443 ssl http2;
    server_name panel.turkmuhendisi.com;

    ssl_certificate /etc/letsencrypt/live/turkmuhendisi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/turkmuhendisi.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;

    location / {
        proxy_pass http://turkmuhendisi_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen __NGINX_BIND_IP__:443 ssl http2;
    server_name api.turkmuhendisi.com;

    ssl_certificate /etc/letsencrypt/live/turkmuhendisi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/turkmuhendisi.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 50m;

    location / {
        proxy_pass http://turkmuhendisi_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen __NGINX_BIND_IP__:443 ssl http2;
    server_name cdn.turkmuhendisi.com;

    ssl_certificate /etc/letsencrypt/live/turkmuhendisi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/turkmuhendisi.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 50m;

    location / {
        proxy_pass http://turkmuhendisi_cdn;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }
}
