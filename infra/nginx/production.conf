# Üretim reverse proxy — tüm domain'ler
# SSL: scripts/cert-init.sh (ilk kurulum)

upstream next_app {
    server app:3000;
    keepalive 16;
}

upstream minio_cdn {
    server minio:9000;
    keepalive 16;
}

# ─── HTTP → HTTPS + ACME ───────────────────────────────────────

server {
    listen 80;
    server_name turkmuhendisi.com www.turkmuhendisi.com panel.turkmuhendisi.com api.turkmuhendisi.com cdn.turkmuhendisi.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── Ana site ────────────────────────────────────────────────────

server {
    listen 443 ssl http2;
    server_name turkmuhendisi.com www.turkmuhendisi.com;

    ssl_certificate /etc/letsencrypt/live/turkmuhendisi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/turkmuhendisi.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:WEB_SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    if ($host = www.turkmuhendisi.com) {
        return 301 https://turkmuhendisi.com$request_uri;
    }

    location / {
        proxy_pass http://next_app;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

