# Üretim — paylaşımlı sunucu (host nginx 80/443, Docker sadece localhost portları)
# Kullanım: ./deploy

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
      args:
        NEXT_PUBLIC_WEB_URL: ${NEXT_PUBLIC_WEB_URL}
        NEXT_PUBLIC_PANEL_URL: ${NEXT_PUBLIC_PANEL_URL}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_CDN_URL: ${NEXT_PUBLIC_CDN_URL}
    container_name: turkmuhendisi-app
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-turkmuhendisi}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-turkmuhendisi}
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
    ports:
      - "127.0.0.1:${APP_PORT:-3020}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    container_name: turkmuhendisi-migrate
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-turkmuhendisi}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-turkmuhendisi}
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  cdn:
    image: nginx:alpine
    container_name: turkmuhendisi-cdn
    restart: unless-stopped
    ports: !override
      - "127.0.0.1:${CDN_PORT:-3021}:80"
    volumes:
      - ./infra/nginx/cdn.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      minio:
        condition: service_healthy

  nginx:
    profiles: ["standalone"]

  postgres:
    ports: !reset []
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-turkmuhendisi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-turkmuhendisi}

  redis:
    ports: !reset []

  minio:
    ports: !reset []
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
      MINIO_BROWSER_REDIRECT_URL: ${MINIO_CONSOLE_URL:-https://cdn.turkmuhendisi.com}

  minio-init:
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-turkmuhendisi}
