# Üretim CDN proxy — cdn.turkmuhendisi.com
# SSL sertifikası: certbot certonly --nginx -d cdn.turkmuhendisi.com
# veya: certbot certonly --webroot -w /var/www/certbot -d cdn.turkmuhendisi.com

upstream minio_cdn {
    server minio:9000;
    keepalive 32;
}

server {
    listen 80;
    server_name cdn.turkmuhendisi.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name cdn.turkmuhendisi.com;

    ssl_certificate /etc/letsencrypt/live/cdn.turkmuhendisi.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cdn.turkmuhendisi.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:CDN_SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    client_max_body_size 50m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    location / {
        proxy_pass http://minio_cdn/turkmuhendisi/;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-amz-id-2;
        proxy_hide_header Server;

        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Content-Type, Origin, Accept" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Type, ETag, Last-Modified" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin "*" always;
            add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Content-Length 0;
            return 204;
        }

        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
