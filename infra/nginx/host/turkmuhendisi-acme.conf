# İlk SSL alımı için — sadece HTTP + ACME challenge
# Kurulum: sudo cp infra/nginx/host/turkmuhendisi-acme.conf /etc/nginx/conf.d/
#          sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name turkmuhendisi.com www.turkmuhendisi.com panel.turkmuhendisi.com api.turkmuhendisi.com cdn.turkmuhendisi.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 "turkmuhendisi.com — SSL kurulumu bekleniyor\n";
        add_header Content-Type text/plain;
    }
}
