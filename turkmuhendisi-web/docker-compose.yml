services:
  postgres:
    image: postgres:16-alpine
    container_name: turkmuhendisi-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: turkmuhendisi
      POSTGRES_PASSWORD: turkmuhendisi
      POSTGRES_DB: turkmuhendisi
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U turkmuhendisi -d turkmuhendisi"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: turkmuhendisi-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: turkmuhendisi-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio-init:
    image: minio/mc:latest
    container_name: turkmuhendisi-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb local/turkmuhendisi --ignore-existing &&
      mc anonymous set download local/turkmuhendisi &&
      echo 'MinIO bucket hazir'
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:
